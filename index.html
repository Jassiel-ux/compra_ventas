<!DOCTYPE html>
<html>

<head>
    <title>Sistema Compras y Ventas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>Registro de Usuario</h1>
    <form id="formUsuario" method="POST" action="#">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="email" name="correo" placeholder="Correo" required>
        <input type="password" name="contrasena" placeholder="Contraseña" required>
        <select name="rol">
            <option value="admin">Administrador</option>
            <option value="vendedor">Vendedor</option>
        </select>
        <button type="submit">Registrar</button>
    </form>

    <h1>Registro de Producto</h1>
    <form id="formProducto" method="POST" action="#">
        <input type="text" name="nombre" placeholder="Nombre del producto" required>
        <textarea name="descripcion" placeholder="Descripción"></textarea>
        <input type="number" step="0.01" name="precio_compra" placeholder="Precio compra" required>
        <input type="number" step="0.01" name="precio_venta" placeholder="Precio venta" required>
        <input type="number" name="stock" placeholder="Stock inicial" required>
        <button type="submit">Agregar Producto</button>
    </form>

    <h1>Registrar Compra</h1>
    <form id="formCompra">
        <input type="number" name="usuario_id" placeholder="ID Usuario" required>
        <input type="number" name="producto_id" placeholder="ID Producto" required>
        <input type="number" name="cantidad" placeholder="Cantidad" required>
        <button type="submit">Registrar Compra</button>
    </form>

    <h1>Registrar Venta</h1>
    <form id="formVenta">
        <input type="number" name="usuario_id" placeholder="ID Usuario" required>
        <input type="number" name="producto_id" placeholder="ID Producto" required>
        <input type="number" name="cantidad" placeholder="Cantidad" required>
        <button type="submit">Registrar Venta</button>
    </form>


    <script src="js/app.js"></script>
</body>

</html>
